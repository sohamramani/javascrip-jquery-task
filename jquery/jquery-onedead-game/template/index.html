<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE DEAD</title>
        <!-- bootstrap and css -->
        <link rel="stylesheet" href="../css/bootstrap.min.css">
        <link rel="stylesheet" href="../css/style.css">
</head>
<body class="container">
    <div class="row">
        <div class="">
            <input type="button" class=" col-4 p-3 fs-3 btn btn-outline-success border-2" id="strat" value="strat">
        </div>
        <div class="border rounded-3 border-black border-3 h-100 w-50 m-2 col game" id="game">
            <!-- screen -->
            <div class="m-4 p-5 border rounded-3 border-success border-2 h-100 text-center row">
                <div class="display_num" id="one_num"></div>
                <div class="text-success fs-5" id="dead"></div>
                <div class="text-danger fs-5" id="injured"></div>
                <div class="text-dark fs-4" id="error"></div>
            </div>
            <!-- buttons -->
            <div class="row text-center mb-2 m-4">
                <input type="button" class="col-4 p-3 fs-1 btn btn-outline-dark border-2 num_value" id="1" value="1">
                <input type="button" class="col-4 p-3 fs-1 btn btn-outline-dark border-2 num_value" id="2" value="2">
                <input type="button" class="col-4 p-3 fs-1 btn btn-outline-dark border-2 num_value" id="3" value="3">
            </div>
            <div class="row text-center mb-2 m-4">
                <input type="button" class="col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="4" value="4">
                <input type="button" class="col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="5" value="5">
                <input type="button" class="col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="6" value="6">
            </div>
            <div class="row text-center mb-2 m-4">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="7" value="7">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="8" value="8">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="9" value="9">
            </div>
            <div class="row text-center mb-4 m-4">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-danger border-2" id="clear" value="Clear">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-dark border-2 num_value" id="0" value="0">
                <input type="button" class=" col-4 p-4 fs-1 btn btn-outline-danger border-2" id="enter" value="Enter">
            </div>
        </div>
        <!-- table for display history -->
        <div class="col game w-100" >
            <table id="myTable">
                <thead>
                    <tr>
                        <th>Move</th>
                        <th>Code</th>
                        <th>Dead</th>
                        <th>Injured</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
        <!-- javascript and jquery -->
        <script src="../js/jquery-3.7.1.min.js"></script>
        <script src="../js/script.js"></script>
</body>
</html>
